defaults:
  - data: custom_dataset
  - model: resnet50
  - _self_

seed: 42

wandb:
  project: research-template
  entity: null
  mode: online  # online | offline | disabled

optimizer:
  name: adamw
  lr: 0.0001
  weight_decay: 0.05

scheduler:
  name: cosine
  warmup_epochs: 5

train:
  epochs: 100
  amp: true

eval:
  batch_size: 64
