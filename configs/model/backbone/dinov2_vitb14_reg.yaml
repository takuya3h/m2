name: "dinov2_vitb14_reg"
arch: "vitb"
patch_size: 14
embed_dim: 768
num_heads: 12
depth: 12
num_register_tokens: 4
out_indices: [2, 5, 8, 11]
img_size: 518
pretrained: true
hub_repo: "facebookresearch/dinov2"
hub_model: "dinov2_vitb14_reg"

peft:
  method: "lora"
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["qkv", "proj"]
  use_dora: true
  quantization: null

use_bf16: true
gradient_checkpointing: false
