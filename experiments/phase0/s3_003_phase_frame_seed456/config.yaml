seed: 456
deterministic: true
cudnn_benchmark: false
phase:
  current: phase0
  mask_available: false
model:
  num_classes: 19
  input_dim: 512
  backbone: dinov2_vitl14_reg
  detection_head: mask_dino
  phase_head:
    input_dim: 2048
    hidden_dim: 512
    num_classes: 9
    dropout: 0.3
feedback:
  phase_to_det: false
  det_to_phase: false
  injection_method: cross_attention
  entropy_gating: true
  stop_gradient: true
relation:
  enabled: false
exo:
  enabled: false
loss:
  lambda_det: 1.0
  lambda_mask: 0.0
  lambda_rel: 0.0
  lambda_phase: 0.5
  lambda_temp_smooth: 0.1
  lambda_ssl: 0.0
  lambda_distill: 0.0
  lambda_view_consist: 0.0
  balancer: famo
  label_smoothing: 0.1
train:
  epochs: 5
  amp: false
  gradient_checkpoint: true
  batch_size: 32
  num_workers: 4
  accumulate_grad_batches: 1
  load_from: null
  real_detector: false
  grad_clip_norm: 1.0
  freeze_backbone: true
optimizer:
  name: adamw
  lr: 0.0001
  weight_decay: 0.05
scheduler:
  name: cosine
  warmup_epochs: 0
experiment:
  base_dir: experiments
  category: phase0
  step: s3
  description: phase_frame
logging:
  wandb_project: egosurgery_multitask
  wandb_entity: null
  wandb_enabled: true
  log_every_n_steps: 50
  save_top_k: 1
eval:
  num_seeds: 3
  bootstrap_n: 1000
  delta_significance_threshold: 1.0
data:
  image_size: 224
  include_hand: true
  include_phase: true
  phase_ann_dir: data/annotations/egosurgery_phase
  train:
    ann_file: data/annotations/egosurgery_tool_hand/instances_train.json
    img_dir: data/raw/ego/
  val:
    ann_file: data/annotations/egosurgery_tool_hand/instances_val.json
    img_dir: data/raw/ego/
  test:
    ann_file: data/annotations/egosurgery_tool_hand/instances_test.json
    img_dir: data/raw/ego/
